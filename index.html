<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pleno | O Código</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --bg-black: #000;
            --white: #fff;
            --bg-light: #f0f0f0;
            --red-btn: #d30000;
            --black-card: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: var(--bg-black);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* CABEÇALHO */
        header {
            background: #000;
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 2000;
            height: 85px;
            border-bottom: 2px solid var(--gold);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
        }

        .logo img {
            height: 60px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
        }

        #btn-voltar {
            display: none;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 5px 12px;
            font-size: 0.6rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* SEÇÃO 3: SINOPSE (TRÊS COLUNAS REFORÇADAS) */
        .view-sinopse {
            display: none;
            background: #fff;
            color: #333;
            padding: 140px 0 0;
            min-height: 100vh;
        }

        .container-trindade {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr 300px; /* COLUNA 1: MOCKUP | COLUNA 2: TEXTO | COLUNA 3: COMPRA */
            gap: 40px;
            padding: 0 40px 80px;
        }

        /* COLUNA 1: MOCKUP DO LIVRO X */
        .col-mockup {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .book-x {
            width: 100%;
            max-width: 300px;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2));
            transition: 0.5s;
        }

        .book-x:hover {
            transform: scale(1.02);
        }

        /* COLUNA 2: TEXTO DA SINOPSE */
        .col-texto {
            padding: 0 10px;
        }

        .view-sinopse h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: #000;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .author {
            color: var(--gold);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 40px;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .description p {
            margin-bottom: 25px;
            font-size: 1.1rem;
            text-align: justify;
            color: #333;
            line-height: 1.8;
        }

        .section-title {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin: 40px 0 20px;
            color: #000;
            border-bottom: 3px solid var(--gold);
            display: inline-block;
            padding-bottom: 5px;
        }

        /* COLUNA 3: BARRA DE COMPRA */
        .col-compra {
            position: sticky;
            top: 120px;
            height: fit-content;
        }

        .buy-card {
            background: var(--black-card);
            border-radius: 6px;
            padding: 30px 20px;
            color: #fff;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .price-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .price-value {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .btn-main {
            background: var(--gold);
            color: #000;
            width: 100%;
            border: none;
            padding: 15px;
            font-weight: 900;
            cursor: pointer;
            margin-bottom: 15px;
            font-size: 0.75rem;
            text-transform: uppercase;
            border-radius: 3px;
        }

        .btn-red {
            background: var(--red-btn);
            color: #fff;
            width: 100%;
            border: none;
            padding: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 0.65rem;
            text-transform: uppercase;
            border-radius: 3px;
            transition: 0.3s;
        }

        .btn-red:hover {
            filter: brightness(1.3);
        }

        /* RODAPÉ TÉCNICO */
        .tech-footer {
            background: var(--bg-light);
            padding: 80px 0;
            border-top: 1px solid #ddd;
            width: 100%;
        }

        .tech-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 30px;
            padding: 0 40px;
        }

        .tech-item h4 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #000;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .tech-item p {
            font-size: 0.9rem;
            color: #555;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
        }

        /* CONFIGURAÇÕES HOME E GALERIA */
        .view-home, .view-galeria {
            display: none;
            min-height: 100vh;
            padding: 140px 5% 50px;
        }

        #bg-home {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('capa.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
            filter: brightness(0.6);
        }

        .grid-produtos {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .card-flutuante img {
            width: 100%;
            height: 350px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="bg-home"></div>

    <header>
        <div class="logo">
            <img src="selo.png">
            <span>Portal Pleno O Código</span>
        </div>
        <nav>
            <ul>
                <li><a onclick="location.reload()">Início</a></li>
                <li><a onclick="irTitulos()">Ebook</a></li>
                <li><a href="avaliacoes.html">Avaliações</a></li>
                <li><div id="btn-voltar" onclick="irTitulos()">Voltar</div></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="view-home" style="display: flex;" class="view-home">
            <div style="text-align: center; width: 100%; z-index: 10;">
                <h1 style="color:white; font-size: 4rem;">O CÓDIGO</h1>
                <button class="btn-main" style="width: 250px; margin-top: 20px;" onclick="irTitulos()">ACESSAR ARSENAL</button>
            </div>
        </section>

        <section id="view-galeria" class="view-galeria">
            <div class="grid-produtos">
                <div class="card-flutuante" onclick="abrirSinopse('ebook01.png')">
                    <img src="ebook01.png">
                </div>
                <div class="card-flutuante" onclick="abrirSinopse('ebook02.png')">
                    <img src="ebook02.png">
                </div>
                <div class="card-flutuante" onclick="abrirSinopse('audio01.png')">
                    <img src="audio01.png">
                </div>
                <div class="card-flutuante" onclick="abrirSinopse('audio02.png')">
                    <img src="audio02.png">
                </div>
            </div>
        </section>

        <section id="view-sinopse" class="view-sinopse">
            <div class="container-trindade">
                
                <div class="col-mockup">
                    <img src="" id="target-img" class="book-x">
                </div>

                <div class="col-texto">
                    <h1 id="target-title">Carregando...</h1>
                    <p class="author">POR JÚLIO BHRÓSZ</p>
                    <div class="description">
                        <p id="target-desc">Descrição técnica em processamento...</p>
                        <h3 class="section-title">SINOPSE</h3>
                        <div id="target-sinopse"></div>
                    </div>
                </div>

                <div class="col-compra">
                    <div class="buy-card">
                        <p class="price-label">INVESTIMENTO ÚNICO</p>
                        <p class="price-value" id="target-price">R$ 0,00</p>
                        <button class="btn-main">ADICIONAR AO CARRINHO</button>
                        <button class="btn-red" id="btn-link">COMPRE AGORA</button>
                        <button class="btn-red">COMBO AUDIOBOOK</button>
                        <button class="btn-red">COMBO COMPLETO</button>
                    </div>
                </div>

            </div>

            <div class="tech-footer">
                <div class="tech-grid">
                    <div style="font-family:'Playfair Display'; font-size:1.5rem; font-weight:700">DETALHES DO ATIVO</div>
                    <div class="tech-item">
                        <h4>EDITORA</h4>
                        <p>Portal Pleno O Código</p>
                    </div>
                    <div class="tech-item">
                        <h4>IDIOMA</h4>
                        <p>Português (Brasil)</p>
                    </div>
                    <div class="tech-item">
                        <h4>FORMATO</h4>
                        <p>Digital (Instantâneo)</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function irTitulos() {
            document.getElementById('view-home').style.display = 'none';
            document.getElementById('view-sinopse').style.display = 'none';
            document.getElementById('bg-home').style.display = 'none';
            document.getElementById('view-galeria').style.display = 'block';
            document.getElementById('btn-voltar').style.display = 'none';
        }

        function abrirSinopse(img) {
            document.getElementById('view-galeria').style.display = 'none';
            document.getElementById('view-sinopse').style.display = 'block';
            document.getElementById('target-img').src = img;
            document.getElementById('btn-voltar').style.display = 'block';
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
