<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pleno | O Código</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background-color: var(--bg); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* BRILHO 65% FIXO */
        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('capa.png') no-repeat center center; 
            background-size: cover; z-index: 1; filter: brightness(0.65); transition: 0.8s;
        }
        
        header { 
            background: #000; padding: 0 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 1000; height: 85px; 
            border-bottom: 2px solid var(--gold); 
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 60px; }
        .logo span { color: var(--white); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        nav ul { list-style: none; display: flex; gap: 20px; }
        nav a { text-decoration: none; color: #fff; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        nav a:hover { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .main-container { height: 100vh; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; position: relative; z-index: 10; }
        
        /* COLUNAS COM TÍTULOS */
        .column-box { width: 280px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .column-title { color: var(--gold); font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 700; margin-bottom: 20px; text-shadow: 2px 2px 10px #000; }
        .display-box { width: 100%; height: 450px; cursor: pointer; transition: 0.5s; }
        .display-box:hover { transform: scale(1.03); }
        .display-box img { width: 100%; height: 100%; object-fit: contain; }

        .hero-center { flex: 1; text-align: center; }
        .hero-center h1 { color: var(--white); font-size: clamp(1.2rem, 3vw, 2.5rem); text-transform: uppercase; font-weight: 700; }
        .line-hero { width: 85%; max-width: 450px; height: 5px; background: var(--gold); margin: 20px auto; box-shadow: 0 0 20px var(--gold); }

        /* SINOPSE E BIBLIOTECA */
        #content-overlay { display: none; width: 100%; min-height: 100vh; position: absolute; top: 0; left: 0; z-index: 50; padding: 120px 5%; }
        .sinopse-card { display: grid; grid-template-columns: 1fr 1.5fr; gap: 50px; color: #fff; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <header>
        <div class="logo">
            <img src="selo.png">
            <span>Portal Pleno O Código</span>
        </div>
        <nav>
            <ul>
                <li><a onclick="irHome()">Início</a></li>
                <li><a onclick="irInterna('titulos')">Títulos Ebook</a></li>
                <li><a onclick="irInterna('avaliacoes')">Avaliações</a></li>
                <li><a onclick="irInterna('degustacao')">Degustação</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container" id="home-view">
        <div class="column-box">
            <div class="column-title">Ebooks</div>
            <div class="display-box" onclick="irInterna('titulos')">
                <img id="loop-ebook" src="ebook01.png">
            </div>
        </div>

        <div class="hero-center">
            <h1>O CONFORTO É UMA PRISÃO</h1>
            <div class="line-hero"></div>
            <h1>O CÓDIGO É A CHAVE</h1>
        </div>

        <div class="column-box">
            <div class="column-title">Audiobooks</div>
            <div class="display-box" onclick="irInterna('titulos')">
                <img id="loop-audio" src="audio01.png">
            </div>
        </div>
    </main>

    <div id="content-overlay">
        </div>

    <script>
        const ebooks = ['ebook01.png', 'ebook02.png', 'ebook03.png'];
        const audios = ['audio01.png', 'audio02.png', 'audio03.png', 'audio04.png', 'audio05.png', 'audio06.png'];
        let eIdx = 0, aIdx = 0;

        // LOOP AUTOMÁTICO RESTAURADO
        function startLoops() {
            setInterval(() => {
                eIdx = (eIdx + 1) % ebooks.length;
                document.getElementById('loop-ebook').src = ebooks[eIdx];
            }, 3000);
            setInterval(() => {
                aIdx = (aIdx + 1) % audios.length;
                document.getElementById('loop-audio').src = audios[aIdx];
            }, 3000);
        }

        function irHome() {
            document.getElementById('content-overlay').style.display = 'none';
            document.getElementById('home-view').style.display = 'flex';
            document.getElementById('bg').style.backgroundImage = "url('capa.png')";
        }

        function irInterna(tipo) {
            document.getElementById('home-view').style.display = 'none';
            const overlay = document.getElementById('content-overlay');
            overlay.style.display = 'block';
            document.getElementById('bg').style.backgroundImage = "url('banner.png')";
            
            if(tipo === 'titulos') {
                overlay.innerHTML = `<h2 style="color:var(--gold); text-align:center;">BIBLIOTECA FLUTUANTE</h2>`;
                // Injetar grid aqui...
            }
        }

        startLoops();
    </script>
</body>
</html>
