<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pleno | O Código</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background-color: var(--bg); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* BRILHO 65% FIXO */
        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('capa.png') no-repeat center center; 
            background-size: cover; z-index: 1; filter: brightness(0.65); transition: 0.8s;
        }
        
        header { 
            background: #000; padding: 0 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 1000; height: 85px; 
            border-bottom: 2px solid var(--gold); 
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 60px; }
        .logo span { color: var(--white); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; }

        nav ul { list-style: none; display: flex; gap: 18px; }
        nav a { text-decoration: none; color: #fff; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        .main-container { height: 100vh; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; position: relative; z-index: 10; }
        
        /* COLUNAS HOME */
        .column-box { width: 280px; text-align: center; }
        .column-title { color: var(--gold); font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 700; margin-bottom: 20px; }
        .display-box { width: 100%; height: 420px; cursor: pointer; transition: 0.5s; }
        .display-box img { width: 100%; height: 100%; object-fit: contain; }

        .hero-center { flex: 1; text-align: center; }
        .hero-center h1 { color: var(--white); font-size: clamp(1.2rem, 3vw, 2.5rem); text-transform: uppercase; }
        .line-hero { width: 80%; height: 5px; background: var(--gold); margin: 20px auto; box-shadow: 0 0 15px var(--gold); }

        /* GRID DE PRODUTOS FLUTUANTES */
        #content-overlay { display: none; width: 100%; min-height: 100vh; position: absolute; top: 0; left: 0; z-index: 50; padding: 120px 5% 50px; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 40px; max-width: 1400px; margin: 0 auto; }
        
        .card-flutuante { text-align: center; cursor: pointer; animation: flutuar 4s ease-in-out infinite; transition: 0.4s; }
        .card-flutuante:hover { transform: scale(1.05); animation-play-state: paused; }
        .card-flutuante img { width: 100%; height: 260px; object-fit: contain; margin-bottom: 10px; }
        .stars { color: var(--gold); font-size: 1rem; letter-spacing: 2px; }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* PAGINA SINOPSE */
        #sinopse-page { display: none; width: 100%; padding: 120px 5%; color: #fff; z-index: 100; position: relative; }
        .sinopse-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 60px; }
        .sinopse-layout img { width: 100%; border: 1px solid var(--gold); }
    </style>
</head>
<body>
    <div id="bg"></div>
    <header>
        <div class="logo"><img src="selo.png"><span>Portal Pleno O Código</span></div>
        <nav>
            <ul id="nav-links">
                <li><a onclick="irHome()">Início</a></li>
                <li><a onclick="irTitulos()">Títulos Ebook</a></li>
                <li id="menu-sinopse" style="display:none;"><a onclick="irSinopse()">Sinopse</a></li>
                <li><a href="#">Avaliações</a></li>
                <li><a href="#">Degustação</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container" id="view-home">
        <div class="column-box">
            <div class="column-title">Ebooks</div>
            <div class="display-box" onclick="irTitulos()"><img id="loop-e" src="ebook01.png"></div>
        </div>
        <div class="hero-center">
            <h1>O CONFORTO É UMA PRISÃO</h1>
            <div class="line-hero"></div>
            <h1>O CÓDIGO É A CHAVE</h1>
        </div>
        <div class="column-box">
            <div class="column-title">Audiobooks</div>
            <div class="display-box" onclick="irTitulos()"><img id="loop-a" src="audio01.png"></div>
        </div>
    </main>

    <section id="content-overlay">
        <div class="grid-produtos" id="render-grid"></div>
    </section>

    <section id="sinopse-page">
        <div class="sinopse-layout">
            <div class="sin-img"><img id="target-img" src=""></div>
            <div class="sin-text">
                <h2 id="target-title" style="color:var(--gold); font-size:2.5rem; text-transform:uppercase;"></h2>
                <p style="margin-top:30px; line-height:1.8; font-size:1.1rem;">Análise visceral e técnica da supremacia intelectual. O hardware mental em sua máxima performance.</p>
                <div class="stars" style="margin-top:20px;">★★★★★</div>
            </div>
        </div>
    </section>

    <script>
        const hardware = {
            e: ['ebook01.png', 'ebook02.png', 'ebook03.png'],
            a: ['audio01.png', 'audio02.png', 'audio03.png', 'audio04.png', 'audio05.png', 'audio06.png']
        };

        // LOOP AUTOMÁTICO
        let iE = 0, iA = 0;
        setInterval(() => { iE = (iE + 1) % hardware.e.length; document.getElementById('loop-e').src = hardware.e[iE]; }, 3000);
        setInterval(() => { iA = (iA + 1) % hardware.a.length; document.getElementById('loop-a').src = hardware.a[iA]; }, 3000);

        function irHome() {
            reset();
            document.getElementById('view-home').style.display = 'flex';
            document.getElementById('bg').style.backgroundImage = "url('capa.png')";
        }

        function irTitulos() {
            reset();
            const overlay = document.getElementById('content-overlay');
            const grid = document.getElementById('render-grid');
            overlay.style.display = 'block';
            document.getElementById('bg').style.backgroundImage = "url('banner.png')";
            
            const all = [...hardware.e, ...hardware.a];
            grid.innerHTML = all.map(img => `
                <div class="card-flutuante" onclick="abrirSinopse('${img}')">
                    <img src="${img}">
                    <div class="stars">★★★★★</div>
                </div>
            `).join('');
        }

        function abrirSinopse(img) {
            reset();
            document.getElementById('target-img').src = img;
            document.getElementById('target-title').innerText = img.replace('.png', '').toUpperCase();
            document.getElementById('sinopse-page').style.display = 'block';
            document.getElementById('menu-sinopse').style.display = 'block';
            document.getElementById('bg').style.backgroundImage = "url('banner.png')";
        }

        function reset() {
            ['view-home', 'content-overlay', 'sinopse-page'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById('menu-sinopse').style.display = 'none';
        }
    </script>
</body>
</html>
