<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pleno | O Código</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg-black: #000; --white: #fff; --bg-light: #f9f9f9; --red-btn: #d30000; --glow: rgba(255, 215, 0, 0.6); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { min-height: 100%; background-color: var(--bg-black); font-family: 'Inter', sans-serif; overflow-x: hidden; display: flex; flex-direction: column; }

        /* HEADER (IMUTÁVEL) */
        header { background: #000; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 2000; height: 85px; border-bottom: 2px solid var(--gold); }
        .logo { display: flex; align-items: center; gap: 15px; color: #fff; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; }
        .logo img { height: 60px; }
        nav ul { list-style: none; display: flex; gap: 20px; align-items: center; }
        nav a { text-decoration: none; color: #fff; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; border-bottom: 2px solid transparent; padding-bottom: 5px; }
        nav a:hover, nav a.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        #btn-voltar { display: none; color: var(--gold); border: 1px solid var(--gold); padding: 5px 12px; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }

        /* FUNDO */
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('capa.png') no-repeat center center; background-size: cover; z-index: 1; filter: brightness(0.4); }
        main { flex: 1; position: relative; z-index: 10; padding-top: 85px; }

        /* VIEWS PADRÃO (HOME, GALERIA, SINOPSE) */
        .view-home { min-height: calc(100vh - 85px); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; }
        .column-box { width: 280px; text-align: center; }
        .column-box p { color: var(--gold); letter-spacing: 5px; font-size: 0.7rem; margin-bottom: 0; padding-bottom: 5px; font-weight: 700; }
        .display-box { width: 100%; height: 420px; cursor: pointer; transition: 0.5s; }
        .display-box img { width: 100%; height: 100%; object-fit: contain; }
        .hero-center h1 { color: #fff; font-size: 2.2rem; text-transform: uppercase; line-height: 1.2; text-align: center; }
        .line-hero { width: 85%; height: 5px; background: var(--gold); margin: 15px auto; box-shadow: 0 0 20px var(--gold); }

        .view-galeria { display: none; background: #000; min-height: 100vh; padding: 60px 5% 100px; }
        .grid-produtos { display: grid; grid-template-columns: repeat(4, 1fr); gap: 60px; max-width: 1400px; margin: 0 auto; }
        .card-flutuante { text-align: center; cursor: pointer; transition: transform 0.4s ease; animation: flutuar 4s ease-in-out infinite; }
        .card-flutuante img { width: 100%; height: 350px; object-fit: contain; transition: 0.4s; }
        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .view-sinopse { display: none; background: #fff; min-height: 100vh; padding: 60px 0 80px; color: #000; }
        .container-trindade { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 280px 1fr 280px; gap: 40px; padding: 0 40px; }
        .col-mockup img { width: 100%; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2)); }
        .col-texto h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: #000; line-height: 1.1; margin-bottom: 10px; }
        .buy-card { background: #1a1a1a; border-radius: 8px; padding: 30px 20px; color: #fff; text-align: center; }
        .btn-gold { background: var(--gold); color: #000; width: 100%; border: none; padding: 15px; font-weight: 900; cursor: pointer; margin-bottom: 15px; text-transform: uppercase; font-size: 0.7rem; }
        .btn-red { background: var(--red-btn); color: #fff; width: 100%; border: none; padding: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; font-size: 0.65rem; }

        /* VIEW AVALIAÇÕES (FUSAO) */
        .container-avaliacoes { 
            display: grid; 
            grid-template-columns: 1fr 360px 1fr; 
            gap: 20px; 
            align-items: start;
            margin-top: 15px; /* Redução de 80% no respiro do topo */
        }
        .form-insercao { 
            background: #fff; 
            padding: 20px; 
            border-radius: 4px; 
            border-left: 4px solid var(--gold); 
            color: #000;
        }
        .form-insercao h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 15px; text-align: center; }
        .form-group { margin-bottom: 12px; text-align: left; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; font-size: 0.8rem; }
        
        .col-testemunhos { display: flex; flex-direction: column; gap: 15px; }
        .card-av { background: rgba(255,255,255,0.1); padding: 15px; border-left: 2px solid var(--gold); font-size: 0.8rem; }
        .card-av .stars-av { color: var(--gold); margin-bottom: 5px; }
        .card-av .email-av { font-size: 0.7rem; color: #aaa; }

        .final-footer { background: #000; color: #666; font-size: 0.65rem; text-align: center; padding: 30px 0; border-top: 1px solid #111; text-transform: uppercase; letter-spacing: 2px; width: 100%; z-index: 1000; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <header>
        <div class="logo"><img src="selo.png"><span>Portal Pleno O Código</span></div>
        <nav>
            <ul id="main-nav">
                <li><a id="nav-home" class="active" onclick="irHome()">Início</a></li>
                <li><a id="nav-ebook" onclick="irTitulos()">Ebook</a></li>
                <li><a id="nav-sinopse" onclick="abrirSinopseDefault()">Sinopse</a></li>
                <li><a id="nav-avaliacoes" onclick="abrirInfo('avaliacoes')">Compartilhe Experiência</a></li>
                <li><a id="nav-degustacao" onclick="abrirInfo('degustacao')">Degustação</a></li>
                <li><a id="nav-sobre" onclick="abrirInfo('sobre')">Sobre</a></li>
                <li><div id="btn-voltar" onclick="voltarFluxo()">Voltar</div></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="view-home" class="view-home">
            <div class="column-box"><p>EBOOKS</p><div class="display-box" onclick="irTitulos()"><img id="loop-e" src="ebook01.png"></div></div>
            <div class="hero-center"><h1>O CONFORTO É UMA PRISÃO</h1><div class="line-hero"></div><h1>O CÓDIGO É A CHAVE</h1></div>
            <div class="column-box"><p>AUDIOBOOKS</p><div class="display-box" onclick="irTitulos()"><img id="loop-a" src="audio01.png"></div></div>
        </div>

        <section id="view-galeria" class="view-galeria"><div class="grid-produtos" id="render-grid"></div></section>

        <section id="view-sinopse" class="view-sinopse">
            <div class="container-trindade">
                <div class="col-mockup"><img id="target-img" src=""></div>
                <div class="col-texto">
                    <h1 id="target-title">TÍTULO</h1>
                    <p class="author">POR JÚLIO BHRÓSZ</p>
                    <div class="description"><p id="target-desc">...</p></div>
                </div>
                <div class="col-compra">
                    <div class="buy-card">
                        <p class="price-label">POR APENAS</p>
                        <p class="price-value" id="target-price">R$ 0,00</p>
                        <button class="btn-gold" onclick="checkout()">Compre Agora</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-info-extra" style="display:none; padding:20px 5%;">
            <div id="content-info"></div>
        </section>
    </main>

    <div class="final-footer">© 2026 Portal Pleno | O Código</div>

    <script>
        const hardware = {
            e: [{img: 'ebook01.png', title: 'Know Yourself First', price: '$ 11.00', link: 'https://pay.kiwify.com/8S4FCE0'}, {img: 'ebook04.png', title: 'Descubra Você', price: 'R$ 29,50', link: 'https://pay.kiwify.com.br/P8UTO6L'}],
            a: [{img: 'audio01.png', title: 'Know Yourself First', price: '$ 13.95', link: 'https://pay.kiwify.com/ilgU4Kg'}]
        };

        function resetTelas() { ['view-home', 'view-galeria', 'view-sinopse', 'view-info-extra', 'btn-voltar'].forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'none'; }); }
        function irHome() { resetTelas(); document.getElementById('view-home').style.display = 'flex'; historico = 'home'; }
        function irTitulos() { resetTelas(); document.getElementById('view-galeria').style.display = 'block'; document.getElementById('btn-voltar').style.display = 'block'; historico = 'titulos'; 
            document.getElementById('render-grid').innerHTML = [...hardware.e, ...hardware.a].map(item => `<div class="card-flutuante" onclick="abrirSinopse('${item.img}', '${item.title}', '${item.price}', '${item.link}')"><img src="${item.img}"></div>`).join('');
        }

        function abrirInfo(tipo) {
            resetTelas();
            const container = document.getElementById('content-info');
            document.getElementById('view-info-extra').style.display = 'block';
            document.getElementById('btn-voltar').style.display = 'block';
            
            if(tipo === 'avaliacoes') {
                container.innerHTML = `
                    <div class="container-avaliacoes">
                        <div class="col-testemunhos" id="col-left"></div>
                        <div class="form-insercao">
                            <h2>Compartilhe sua experiência</h2>
                            <form id="f-av">
                                <div class="form-group"><label>Nome</label><input type="text" required></div>
                                <div class="form-group"><label>Email</label><input type="email" required></div>
                                <div class="form-group"><label>Experiência (max 100)</label><textarea maxlength="100" rows="3"></textarea></div>
                                <div class="form-group"><label>Estrelas</label>
                                    <select id="stars-sel">
                                        <option value="5">★★★★★</option><option value="4">★★★★</option><option value="3">★★★</option><option value="2">★★</option><option value="1">★</option>
                                    </select>
                                </div>
                                <button type="button" class="btn-gold" style="padding:10px; font-size:0.6rem">Enviar</button>
                            </form>
                        </div>
                        <div class="col-testemunhos" id="col-right"></div>
                    </div>`;
                renderTestemunhos();
            } else {
                container.innerHTML = `<h2 style="color:#fff">${tipo.toUpperCase()}</h2><p style="color:#ccc">Conteúdo em processamento.</p>`;
            }
        }

        function renderTestemunhos() {
            const dataLeft = [
                {n: "Maria S.", e: "m.silva@ficticio.com", t: "Mudou minha perspectiva sobre a vida.", s: 5},
                {n: "John D.", e: "j.doe@ficticio.com", t: "Essential guidance for personal growth.", s: 5},
                {n: "Jean P.", e: "j.pierre@ficticio.fr", t: "Une analyse profonde et nécessaire.", s: 5}
            ];
            const dataRight = [
                {n: "Ana C.", e: "ana@ficticio.com", t: "Engenharia comportamental pura.", s: 5},
                {n: "Carlos O.", e: "c.oli@ficticio.com", t: "Vale cada segundo da leitura.", s: 4},
                {n: "Roberto M.", e: "rob@ficticio.com", t: "A chave para a soberania mental.", s: 5}
            ];
            const mapCard = d => `<div class="card-av"><div class="stars-av">${'★'.repeat(d.s)}</div><p>"${d.t}"</p><p class="author-name" style="margin-top:10px; font-weight:700">${d.n}</p><p class="email-av">${d.e}</p></div>`;
            document.getElementById('col-left').innerHTML = dataLeft.map(mapCard).join('');
            document.getElementById('col-right').innerHTML = dataRight.map(mapCard).join('');
        }

        function abrirSinopseDefault() { irTitulos(); }
        function voltarFluxo() { irHome(); }
    </script>
</body>
</html>
