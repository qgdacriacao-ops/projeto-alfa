<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pleno | O Código</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg-black: #000; --white: #fff; --bg-light: #f0f0f0; --red-btn: #d30000; --black-card: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-black); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        header { 
            background: #000; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 2000; height: 85px; border-bottom: 2px solid var(--gold); 
        }
        .logo { display: flex; align-items: center; gap: 15px; color: #fff; font-weight: 700; text-transform: uppercase; }
        .logo img { height: 60px; }
        nav a { text-decoration: none; color: #fff; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-left: 20px; cursor: pointer; }

        #btn-voltar { display: none; color: var(--gold); border: 1px solid var(--gold); padding: 5px 12px; font-size: 0.6rem; font-weight: 700; cursor: pointer; }

        /* GALERIA */
        .view-galeria { display: none; padding: 140px 5% 80px; background: #000; min-height: 100vh; }
        .grid-produtos { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; max-width: 1400px; margin: 0 auto; }
        .card-flutuante { text-align: center; cursor: pointer; transition: 0.4s; }
        .card-flutuante img { width: 100%; height: 350px; object-fit: contain; }
        .card-flutuante:hover img { filter: drop-shadow(0 0 25px var(--gold)); transform: scale(1.05); }

        /* SINOPSE - TRÊS COLUNAS (MOCKUP | TEXTO | COMPRA) */
        .view-sinopse { display: none; background: #fff; color: #333; padding: 140px 0 0; min-height: 100vh; }
        .container-trindade { 
            max-width: 1400px; margin: 0 auto; display: grid; 
            grid-template-columns: 350px 1fr 300px; gap: 50px; padding: 0 40px 80px; 
        }
        .col-mockup img { width: 100%; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2)); }
        
        .col-texto h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: #000; line-height: 1.1; margin-bottom: 10px; }
        .author { color: var(--gold); font-weight: 700; text-transform: uppercase; margin-bottom: 35px; font-size: 0.9rem; }
        .description p { margin-bottom: 25px; font-size: 1.1rem; text-align: justify; line-height: 1.8; }
        .section-title { font-weight: 700; text-transform: uppercase; font-size: 0.8rem; border-bottom: 3px solid var(--gold); display: inline-block; padding-bottom: 5px; margin: 30px 0 20px; }

        .buy-card { 
            background: var(--black-card); border-radius: 6px; padding: 30px 20px; color: #fff; 
            position: sticky; top: 120px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .price-value { font-size: 2.2rem; font-weight: 700; margin-bottom: 25px; }
        .btn-main { background: var(--gold); color: #000; width: 100%; border: none; padding: 15px; font-weight: 900; cursor: pointer; margin-bottom: 15px; font-size: 0.75rem; text-transform: uppercase; }
        .btn-red { background: var(--red-btn); color: #fff; width: 100%; border: none; padding: 12px; font-weight: 700; cursor: pointer; margin-bottom: 10px; font-size: 0.65rem; text-transform: uppercase; transition: 0.3s; }

        .tech-footer { background: var(--bg-light); padding: 80px 0; border-top: 1px solid #ddd; }
        .tech-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 30px; padding: 0 40px; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><img src="selo.png"> Portal Pleno O Código</div>
        <nav>
            <a onclick="location.reload()">Início</a>
            <a onclick="irTitulos()">Ebook</a>
            <div id="btn-voltar" onclick="irTitulos()">Voltar</div>
        </nav>
    </header>

    <main>
        <section id="view-galeria" class="view-galeria"><div class="grid-produtos" id="render-grid"></div></section>

        <section id="view-sinopse" class="view-sinopse">
            <div class="container-trindade">
                <div class="col-mockup"><img src="" id="target-img"></div>
                <div class="col-texto">
                    <h1 id="target-title">Título</h1>
                    <p class="author">POR JÚLIO BHRÓSZ</p>
                    <div class="description" id="target-desc"></div>
                </div>
                <div class="col-compra">
                    <div class="buy-card">
                        <p style="font-size:0.6rem; color:var(--gold); letter-spacing:2px">INVESTIMENTO ÚNICO</p>
                        <p class="price-value" id="target-price">R$ 0,00</p>
                        <button class="btn-main" id="btn-carrinho">ADICIONAR AO CARRINHO</button>
                        <button class="btn-red" id="btn-comprar">COMPRE AGORA</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const arsenal = {
            'ebook01.png': { titulo: 'Descubra Você', preco: 'R$ 39,00', link: 'https://pay.kiwify.com.br/D5I6Q2J', desc: 'O Amor Extraordinário Começa Onde Você Menos Espera: Dentro de Você.' },
            'ebook02.png': { titulo: 'A Engenharia da Colisão', preco: 'R$ 47,00', link: 'https://pay.kiwify.com.br/C77UAVN', desc: 'A anatomia dos impactos sociais e a reconstrução do hardware comportamental.' },
            'ebook03.png': { titulo: 'Autópsia da Personalidade', preco: 'R$ 47,00', link: 'https://pay.kiwify.com.br/1TKVK0', desc: 'Dessecando as camadas invisíveis que moldam quem você é.' },
            'audio01.png': { titulo: 'Combo Soberania (Audio)', preco: 'R$ 97,00', link: 'https://pay.kiwify.com.br/Q2JC77U', desc: 'A experiência auditiva completa da Engenharia da Colisão.' }
            // O sistema segue o mapeamento para os 12 ativos conforme a lista padrão.
        };

        function irTitulos() {
            document.getElementById('view-galeria').style.display = 'block';
            document.getElementById('view-sinopse').style.display = 'none';
            document.getElementById('btn-voltar').style.display = 'none';
            const grid = document.getElementById('render-grid');
            grid.innerHTML = Object.keys(arsenal).map(img => `
                <div class="card-flutuante" onclick="abrirSinopse('${img}')">
                    <img src="${img}">
                </div>`).join('');
        }

        function abrirSinopse(img) {
            const dados = arsenal[img];
            document.getElementById('view-galeria').style.display = 'none';
            document.getElementById('view-sinopse').style.display = 'block';
            document.getElementById('target-img').src = img;
            document.getElementById('target-title').innerText = dados.titulo;
            document.getElementById('target-price').innerText = dados.preco;
            document.getElementById('target-desc').innerHTML = `<p>${dados.desc}</p><h3 class="section-title">SINOPSE TÉCNICA</h3><p>Análise visceral e engenharia aplicada ao comportamento humano.</p>`;
            
            const acao = () => window.open(dados.link, '_blank');
            document.getElementById('btn-carrinho').onclick = acao;
            document.getElementById('btn-comprar').onclick = acao;
            document.getElementById('btn-voltar').style.display = 'block';
            window.scrollTo(0,0);
        }

        window.onload = irTitulos;
    </script>
</body>
</html>
